<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Gallery</title>

    <!-- GOOGLE FONT -->
    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Roboto+Slab:wght@100..900&display=swap"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
          href="gallery.css">

</head>

<body>

    <!-- PARTICLES -->
    <div class="particles"></div>

    <!-- NAV -->
    <nav>

        <a href="index.html">Home</a>

        <a href="gallery.html">Gallery</a>

        <a href="about.html">About</a>

    </nav>

    <!-- TITLE -->
    <h1 class="gallery-title">
        My Memories
    </h1>

    <!-- SIDE ARROWS -->
    <img src="images/left-arrow.png"
         class="arrow left"
         onclick="scrollGallery(-1)">

    <img src="images/right-arrow.png"
         class="arrow right"
         onclick="scrollGallery(1)">

    <!-- GALLERY -->
    <div class="gallery-container"
         id="gallery">

        <!-- PHOTO 1 -->
        <div class="polaroid">

            <img src="images/selfies/dormpic.jpeg"
                 alt="Photo 1"
                 class="gallery-image"
                 onclick="openImage(this)">

            <p>
                Test 1
            </p>

        </div>

        <!-- PHOTO 2 -->
        <div class="polaroid">

            <img src="images/selfies/frogdrawing.jpeg"
                 alt="Photo 2"
                 class="gallery-image"
                 onclick="openImage(this)">

            <p>
                Test 2
            </p>

        </div>

        <!-- PHOTO 3 -->
        <div class="polaroid">

            <img src="images/selfies/pokemonpicture.jpeg"
                 alt="Photo 3"
                 class="gallery-image"
                 onclick="openImage(this)">

            <p>
                Test 3
            </p>

        </div>

        <!-- PHOTO 4 -->
        <div class="polaroid">

            <img src="images/selfies/sainjohnspic.jpeg"
                 alt="Photo 4"
                 class="gallery-image"
                 onclick="openImage(this)">

            <p>
                Test 4
            </p>

        </div>

        <!-- PHOTO 5 -->
        <div class="polaroid">

            <img src="images/selfies/selfiepic.jpeg"
                 alt="Photo 5"
                 class="gallery-image"
                 onclick="openImage(this)">

            <p>
                Test 5
            </p>

        </div>



        <!-- PHOTO 6 -->
        <div class="polaroid">

            <img src="images/selfies/weld.jpeg"
                 alt="Photo 5"
                 class="gallery-image"
                 onclick="openImage(this)">

            <p>
                Test 5
            </p>

        </div>



        <!-- PHOTO 7 -->
        <div class="polaroid">

            <img src="images/selfies/weld2.jpeg"
                 alt="Photo 5"
                 class="gallery-image"
                 onclick="openImage(this)">

            <p>
                Test 5
            </p>

        </div>



        <!-- PHOTO 7 -->
        <div class="polaroid">

            <img src="images/selfies/physicspicture.MOV"
                 alt="Photo 5"
                 class="gallery-image"
                 onclick="openImage(this)">

            <p>
                Test 5
            </p>

        </div>

    </div>

    <!-- POPUP -->
    <div class="popup"
         id="popup">

        <!-- CLOSE -->
        <img src="images/close.png"
             class="close-btn"
             onclick="closeImage()">

        <!-- LEFT -->
        <img src="images/left-arrow.png"
             class="popup-arrow popup-left"
             onclick="changeImage(-1)">

        <!-- BIG IMAGE -->
        <img class="popup-image"
             id="popup-image">

        <!-- RIGHT -->
        <img src="images/right-arrow.png"
             class="popup-arrow popup-right"
             onclick="changeImage(1)">

    </div>

    <!-- CAMERA SOUND -->
    <audio id="camera-sound">

        <source src="sounds/camera.mp3"
                type="audio/mp3">

    </audio>

    <!-- JAVASCRIPT -->
    <script src="javascript.js"></script>

</body>

</html>
